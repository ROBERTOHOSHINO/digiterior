<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>digiterior</title>
<meta name="description" content="デジタルで、楽を究める。digiterior — love your long life, love your long time.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F6F8;
    --paper-deep:#E9ECF1;
    --sumi:#181A20;
    --sumi-soft:#71767F;
    --hair:rgba(24,26,32,.10);
    /* COLOURFUL JAPAN — 字の中に最初からある色 */
    --c1:#1A237E; --c2:#378ADD; --c3:#1B6B5A;
    --c4:#3B6D11; --c5:#BA7517; --c6:#534AB7;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--paper);
    color:var(--sumi);
    font-family:"IBM Plex Mono",ui-monospace,monospace;
    min-height:100dvh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:clamp(1.6rem,4vh,2.6rem);
    padding:6vh 1.5rem;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  /* 署名: 究 ── 穴(深部)を究める。表は墨一色、触れると中の色が滲む */
  .gate{
    position:relative;display:inline-block;
    text-decoration:none;line-height:1;
    outline:none;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .kiwa{
    position:relative;display:block;
    font-family:"Shippori Mincho B1",serif;
    font-weight:700;
    font-size:clamp(7.5rem,34vw,20rem);
    color:var(--sumi);
    letter-spacing:0;
    transition:transform 1.1s cubic-bezier(.16,1,.3,1);
    will-change:transform;
  }
  /* 字の中に潜んでいた色 ── hover/focus で奥から滲み出る */
  .kiwa::after{
    content:"究";
    position:absolute;inset:0;
    background:conic-gradient(from 210deg,
      var(--c1),var(--c2),var(--c3),var(--c4),var(--c5),var(--c6),var(--c1));
    -webkit-background-clip:text;background-clip:text;
    color:transparent;
    opacity:0;
    transition:opacity 1.2s ease;
  }
  .gate:hover .kiwa::after,
  .gate:focus-visible .kiwa::after{opacity:1}
  .gate:hover .kiwa,
  .gate:focus-visible .kiwa{transform:scale(1.015)}
  .gate:focus-visible{outline:none}
  .gate:focus-visible .kiwa{
    text-shadow:0 0 0 transparent;
  }

  /* 楽を究める ── 触れた人だけに立ち上がる一行 */
  .thesis{
    font-family:"Shippori Mincho B1",serif;
    font-weight:500;
    font-size:clamp(.95rem,2.4vw,1.18rem);
    letter-spacing:.18em;
    color:var(--sumi-soft);
    height:1.2em;
    opacity:0;transform:translateY(6px);
    transition:opacity .9s ease,transform .9s cubic-bezier(.16,1,.3,1);
    pointer-events:none;text-align:center;
  }
  .gate:hover ~ .meta .thesis,
  .gate:focus-visible ~ .meta .thesis{opacity:1;transform:none}

  .meta{
    display:flex;flex-direction:column;align-items:center;
    gap:.85rem;text-align:center;
  }
  .wordmark{
    font-size:clamp(.8rem,2.4vw,.95rem);
    font-weight:400;letter-spacing:.42em;
    text-indent:.42em;
    color:var(--sumi);
    text-transform:lowercase;
  }
  .tagline{
    font-size:clamp(.62rem,1.8vw,.72rem);
    font-style:italic;font-weight:300;
    letter-spacing:.06em;
    color:var(--sumi-soft);
  }
  .tagline sup{font-style:normal;font-size:.7em;letter-spacing:0;opacity:.7}

  /* 静かな入口 ── notesへ。普段は気配だけ */
  .enter{
    position:fixed;left:50%;bottom:clamp(1.4rem,5vh,2.8rem);
    transform:translateX(-50%);
    font-size:.62rem;letter-spacing:.34em;text-indent:.34em;
    text-transform:lowercase;text-decoration:none;
    color:var(--sumi-soft);
    opacity:.32;transition:opacity .6s ease,color .6s ease;
  }
  .enter:hover,.enter:focus-visible{opacity:1;color:var(--sumi);outline:none}

  /* 登場: 究が奥から立ち上がる */
  @keyframes rise{
    from{opacity:0;transform:translateY(14px) scale(.985)}
    to{opacity:1;transform:none}
  }
  .gate{animation:rise 1.4s cubic-bezier(.16,1,.3,1) both}
  .meta{animation:rise 1.4s .25s cubic-bezier(.16,1,.3,1) both}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
    .gate:hover .kiwa::after,.gate:focus-visible .kiwa::after,
    .gate:hover ~ .meta .thesis,.gate:focus-visible ~ .meta .thesis{opacity:1;transform:none}
  }
</style>
</head>
<body>

  <a class="gate" href="/home.html"
     aria-label="究 — デジタルで、楽を究める。">
    <span class="kiwa" aria-hidden="true">究</span>
  </a>

  <div class="meta">
    <p class="thesis">デジタルで、楽を究める。</p>
    <p class="wordmark">digiterior</p>
    <p class="tagline">love your long life, love your long time<sup>™</sup></p>
  </div>

  <a class="enter" href="https://notes.digiterior.net">notes</a>

</body>
</html>
